name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    services:
      postgres:
        image: postgres:16.13
        env:
          POSTGRES_USER: membermatch
          POSTGRES_PASSWORD: membermatch
          POSTGRES_DB: membermatch
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U membermatch"
          --health-interval 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install psql client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Generate synthetic data
        run: python scripts/generate_synthetic_data.py

      - name: Apply migrations
        env:
          DATABASE_URL: postgresql://membermatch:membermatch@localhost:5432/membermatch
        run: ./scripts/apply_migrations.sh

      - name: Run pipeline end-to-end
        env:
          DATABASE_URL: postgresql://membermatch:membermatch@localhost:5432/membermatch
        run: python -m membermatch.pipeline

      - name: Run test suite
        env:
          DATABASE_URL: postgresql://membermatch:membermatch@localhost:5432/membermatch
        run: pytest -v --tb=short
