services:
  postgres:
    image: postgres:16.13
    container_name: membermatch-postgres
    environment:
      POSTGRES_USER: membermatch
      POSTGRES_PASSWORD: membermatch
      POSTGRES_DB: membermatch
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U membermatch"]
      interval: 5s
      timeout: 3s
      retries: 5
